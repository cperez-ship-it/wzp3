services:
  - type: web
    name: bot-supervision-buceo
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: TZ
        value: America/Santiago
      - key: APP_PORT
        value: 10000
